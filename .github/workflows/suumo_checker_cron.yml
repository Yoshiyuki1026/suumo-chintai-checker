name: SUUMO Chintai Availability Checker

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  check-rooms:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run checker script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python suumo_checker.py
        
      - name: Commit and push state
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m 'chore: save updated state [skip ci]' && git push)